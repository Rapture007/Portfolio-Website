<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ali Syed's portfolio showcasing skills in business technology management.">
  <title>Ali Syed's Portfolio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">

  <style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #352a15, #877c51);
        color: #433b1b;
        font-family: 'Roboto', sans-serif;
    }

    /* NAVBAR */
    nav {
        background: linear-gradient(135deg, #212120, #42413f);
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
    }

    nav a {
        color: #ffffff;
    }

    nav a:hover {
        color: #c8b050;
    }

    /* MAIN */
    .main-content {
        padding-top: 80px;
        color: #eae5d1;
    }

    /* NAME */
    .name-highlight {
        background: linear-gradient(90deg, #c8b050, #ddc993);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* BUTTONS */
    .btn-custom {
        background-color: #352a10;
        color: #c8b050;
        border-radius: 5px;
        margin-right: 10px;
        transition: transform 0.2s ease;
    }

    .btn-custom:hover {
        background-color: #1e1807;
        transform: scale(1.1);
    }

    /* IMAGE (UPDATED) */
    .profile-image {
        display: block;
        margin: 0 auto;
    }

    .pic_boarder {
        max-width: 280px;
        width: 100%;
        height: auto;

        border: 3px solid #c8b050;
        border-radius: 15px;

        padding: 6px;
        background: linear-gradient(135deg, #1a1a1a, #3a3a3a);

        box-shadow: 
            0 10px 25px rgba(0,0,0,0.5),
            0 0 15px rgba(200,176,80,0.3);

        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .pic_boarder:hover {
        transform: scale(1.05);
        box-shadow: 
            0 15px 35px rgba(0,0,0,0.6),
            0 0 25px rgba(200,176,80,0.6);
    }

    /* FOOTER */
    footer {
        background: linear-gradient(135deg, #212120, #42413f);
        color: #ffffff;
        padding: 15px 0;
        text-align: center;
    }

  </style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Ali Syed</a>

    <div class="collapse navbar-collapse justify-content-center">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="Work_Experience.html">Work Experience</a></li>
        <li class="nav-item"><a class="nav-link" href="About.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="Contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="container main-content">
  <div class="row align-items-center">

    <div class="col-md-6">
      <h1>Hi, I'm <span class="name-highlight">Ali Syed</span></h1>
      <p style="font-size: 20px;">Business Technology Management Student</p>

      <div>
        <button class="btn btn-custom">Hire Me</button>
        <a href="Work_Experience.html" class="btn btn-custom">See Experience</a>
      </div>
    </div>

    <div class="col-md-6 text-center">
      <img src="SuitPic.jpg" class="profile-image pic_boarder" alt="Ali Syed">
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>Connect with me</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
