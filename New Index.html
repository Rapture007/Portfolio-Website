<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ali Syed's portfolio showcasing skills in business technology management." />
  <title>Ali Syed's Portfolio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #352a15, #877c51);
      color: #eae5d1;
      font-family: 'Roboto', sans-serif;
    }

    /* NAVBAR */
    nav {
      background: linear-gradient(135deg, #212120, #42413f);
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
    }

    nav a {
      color: #ffffff !important;
      font-weight: 500;
    }

    nav a:hover {
      color: #c8b050 !important;
    }

    /* MAIN */
    .main-content {
      padding-top: 80px;
    }

    /* NAME */
    .name-highlight {
      background: linear-gradient(90deg, #c8b050, #ddc993);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }

    /* BUTTONS */
    .btn-custom {
      background-color: #352a10;
      color: #c8b050;
      border-radius: 5px;
      margin-right: 10px;
      border: none;
      transition: transform 0.2s ease, background 0.3s ease;
    }

    .btn-custom:hover {
      background-color: #1e1807;
      transform: scale(1.1);
      color: #fff;
    }

    /* IMAGE FIX (THIS IS THE KEY UPDATE) */
    .profile-image {
      display: block;
      margin: 0 auto;
    }

    .pic_boarder {
      max-width: 260px;   /* smaller size */
      width: 100%;
      height: auto;

      border: 3px solid #c8b050;
      border-radius: 18px;

      padding: 8px;
      background: linear-gradient(135deg, #1a1a1a, #3a3a3a);

      box-shadow: 
        0 12px 30px rgba(0,0,0,0.6),
        0 0 20px rgba(200,176,80,0.3);

      transition: all 0.3s ease;
    }

    .pic_boarder:hover {
      transform: scale(1.05);
      box-shadow: 
        0 18px 40px rgba(0,0,0,0.7),
        0 0 30px rgba(200,176,80,0.6);
    }

    /* FOOTER */
    footer {
      background: linear-gradient(135deg, #212120, #42413f);
      color: #ffffff;
      padding: 15px 0;
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Ali Syed</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="Work_Experience.html">Work Experience</a></li>
        <li class="nav-item"><a class="nav-link" href="About.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="Contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="container main-content">
  <div class="row align-items-center">

    <div class="col-md-6">
      <h1>Hi, I'm <span class="name-highlight">Ali Syed</span></h1>
      <p style="font-size: 20px;">Business Technology Management Student</p>

      <div>
        <button class="btn btn-custom">Hire Me</button>
        <a href="Work_Experience.html" class="btn btn-custom">See Experience</a>
      </div>
    </div>

    <div class="col-md-6 text-center">
      <!-- IMPORTANT: NO inline width/height anymore -->
      <img src="SuitPic.jpg" class="profile-image pic_boarder" alt="Ali Syed" />
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>Connect with me</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
